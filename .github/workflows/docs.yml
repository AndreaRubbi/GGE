name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material "mkdocstrings[python]>=0.24.0"
          pip install anndata scanpy numpy pandas scipy matplotlib seaborn scikit-learn
          pip install -e .
      
      - name: Build docs (verify)
        run: mkdocs build --strict
      
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
